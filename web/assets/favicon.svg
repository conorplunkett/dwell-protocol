<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- DWELL brand mark: white "D$" on the red brand gradient. Colors here are
       the one sanctioned duplication of theme.css values — SVG favicons cannot
       read CSS custom properties from the page. Keep in sync with theme.css
       (--accent-grad-a/b, --accent-ink). -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff0000"/>
      <stop offset="1" stop-color="#c00100"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="8" fill="url(#g)"/>
  <text x="32" y="44" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" font-size="30" font-weight="700" fill="#ffffff">D$</text>
</svg>
