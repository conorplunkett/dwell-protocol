<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- AIAD brand mark: "A$" in AIAD green on the black canvas. Colors here are
       the one sanctioned duplication of theme.css values — SVG favicons cannot
       read CSS custom properties from the page. Keep in sync with theme.css
       (--accent-grad-a/b, --bg-cream). -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34f096"/>
      <stop offset="1" stop-color="#0fa35c"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0a0c0b"/>
  <text x="32" y="44" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" font-size="30" font-weight="700" fill="url(#g)">A$</text>
</svg>
