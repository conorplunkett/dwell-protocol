name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  chrome-extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chrome-extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Lint (syntax)
        run: npm run lint
      - name: Test (headless DOM harness)
        run: npm test

  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: freeai
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/freeai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-audit --no-fund
      - name: End-to-end tests (real Postgres, fake Stripe)
        run: npm test

  terminal:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terminal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Terminal client tests
        run: npm test

  desktop-core:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop/core
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test

  desktop-macos:
    runs-on: macos-14
    defaults:
      run:
        working-directory: desktop/macos/SponsorOverlay
    steps:
      - uses: actions/checkout@v4
      - name: Build (debug + release)
        run: |
          swift build
          swift build -c release
      - name: Package .app (ad-hoc signed)
        run: BUILD_NUMBER="${{ github.run_number }}" DMG_FANCY=0 ./packaging/bundle.sh
      - uses: actions/upload-artifact@v4
        with:
          name: SponsorOverlay-macos
          path: |
            desktop/macos/SponsorOverlay/build/SponsorOverlay.zip
            desktop/macos/SponsorOverlay/build/SponsorOverlay.dmg

  site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Syntax check site JS
        run: node -c web/script.js
      - name: Syntax check AIAD site JS
        run: |
          node -c aiad/web/script.js
          node -c aiad/web/portal.js
      - name: AIAD copy rules (banned language, docs/05-legal-structure.md)
        run: |
          ! grep -rin -E 'moon|price will|appreciat|going up|invest' aiad/web
      - name: Brand separation (zero cross-mentions between the two sites)
        run: |
          ! grep -rIil 'freeai' aiad/web
          ! grep -rIil 'aiad' web

  aiad-contracts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aiad/contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.1
      - name: Build
        run: forge build
      - name: Test
        run: forge test -vv
