name: Deploy dwell-api (bridge)

# ONE-TIME OPS BRIDGE: deploys the DWELL protocol edge function (slug
# `dwell-api`, in the shared Supabase project) from the public
# conorplunkett/dwell-protocol repo, reusing this repo's existing
# SUPABASE_ACCESS_TOKEN secret. Exists only until dwell-protocol carries its
# own SUPABASE_ACCESS_TOKEN secret (its deploy-functions.yml is already in
# place) — then delete this file. Manual dispatch only; never touches the
# FreeAI `api` function.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF || 'wpjfhezklpczxzocgxsb' }}
    steps:
      - name: Check out dwell-protocol (public)
        uses: actions/checkout@v4
        with:
          repository: conorplunkett/dwell-protocol
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Check access token is configured
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set."
            exit 1
          fi
      - name: Deploy dwell-api
        run: supabase functions deploy dwell-api --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
