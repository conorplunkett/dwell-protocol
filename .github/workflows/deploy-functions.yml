name: Deploy Edge Functions

# Deploys the dwell-api Supabase Edge Function (the production DWELL API).
# Runs after a merge to main that touches supabase/functions/** (and on
# demand). Requires two repo secrets:
#   SUPABASE_ACCESS_TOKEN  — a personal access token
#   SUPABASE_PROJECT_REF   — the project ref (defaults to the shared project)
on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - ".github/workflows/deploy-functions.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF || 'wpjfhezklpczxzocgxsb' }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Check access token is configured
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set — add it in repo Settings → Secrets to enable deploys."
            exit 1
          fi
      - name: Deploy dwell-api
        run: supabase functions deploy dwell-api --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
