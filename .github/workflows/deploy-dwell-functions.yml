name: Deploy DWELL Edge Functions

# Deploys the dwell-api Supabase Edge Function (the production DWELL API)
# from dwell/supabase/functions. Runs after a merge to main that touches
# those files (and on demand). Uses the same shared Supabase project and
# repo secrets as deploy-functions.yml; never touches the FreeAI `api`
# function. Replaces both the old deploy-dwell-bridge.yml and the
# standalone dwell-protocol repo's deploy-functions.yml.
on:
  push:
    branches: [main]
    paths:
      - "dwell/supabase/functions/**"
      - ".github/workflows/deploy-dwell-functions.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF || 'wpjfhezklpczxzocgxsb' }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Check access token is configured
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set — add it in repo Settings → Secrets to enable deploys."
            exit 1
          fi
      - name: Deploy dwell-api
        working-directory: dwell
        run: supabase functions deploy dwell-api --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
