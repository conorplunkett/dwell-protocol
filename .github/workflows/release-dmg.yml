name: Release macOS DMG

# Builds the Dwell Sponsor Overlay (ad-hoc signed, universal) and publishes it
# as a GitHub Release on the PUBLIC mirror repo, which is what the site's
# /download/mac redirect serves:
#   https://github.com/conorplunkett/dwell-protocol-public/releases/latest/download/Dwell.dmg
# The source lives here (private); only the release binary is published public so
# the download works for anyone. Requires the PUBLIC_REPO_TOKEN secret (a PAT with
# contents:write on dwell-protocol-public) — the default GITHUB_TOKEN can't write
# to another repo. Manual dispatch only — run it whenever the desktop app should
# ship. Marking the release latest is what flips the download link to the new build.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. desktop-v0.8.0)"
        required: true
        default: "desktop-v0.8.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    defaults:
      run:
        working-directory: dwell/desktop/macos/SponsorOverlay
    steps:
      - uses: actions/checkout@v4
      - name: Build + package (ad-hoc signed, universal)
        run: BUILD_NUMBER="${{ github.run_number }}" DMG_FANCY=0 ./packaging/bundle.sh
      - name: Create release and upload the DMG (on the public mirror repo)
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          gh release create "${{ inputs.tag }}" \
            --repo conorplunkett/dwell-protocol-public \
            --title "Dwell Sponsor Overlay ${{ inputs.tag }}" \
            --notes "Ad-hoc signed macOS build (Apple silicon + Intel, macOS 13+). First launch: right-click the app → Open. Served at dwellprotocol.com/download/mac." \
            --latest \
            build/Dwell.dmg build/Dwell.zip
