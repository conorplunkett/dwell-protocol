name: Deploy dwell-api

# Deploys the Dwell Protocol Edge Function (slug `dwell-api`) after a merge to
# main that touches dwell/supabase/functions/** (and on demand). Runs with
# working-directory `dwell` so the Supabase CLI resolves
# dwell/supabase/functions/dwell-api.
#
# Requires two repo secrets:
#   SUPABASE_ACCESS_TOKEN  — a personal access token (Supabase dashboard → Account → Access Tokens)
#   SUPABASE_PROJECT_REF   — the project ref (defaults below to the shared project)
on:
  push:
    branches: [main]
    paths:
      - "dwell/supabase/functions/**"
      - ".github/workflows/deploy-dwell-api.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF || 'wpjfhezklpczxzocgxsb' }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Check access token is configured
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set — add it in repo Settings → Secrets to enable deploys."
            exit 1
          fi
      - name: Deploy dwell-api
        working-directory: dwell
        run: supabase functions deploy dwell-api --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
