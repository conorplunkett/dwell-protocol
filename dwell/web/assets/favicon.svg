<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- DWELL brand mark: the eight-dot clock sweep (web/assets/logo.svg) on a
       white chip. Colors here are the one sanctioned duplication of
       theme.css values, since SVG favicons cannot read CSS custom
       properties from the page. Keep in sync with theme.css accent red. -->
